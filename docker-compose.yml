services:
    postgres:
        image: postgres:17-alpine
        environment:
            POSTGRES_USER: ${DATABASE_USER}
            POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
            POSTGRES_DB: ${DATABASE_NAME}
        env_file: [.env]
        volumes:
            - postgres_data:/var/lib/postgresql/data
        healthcheck:
            test:
                [
                    "CMD",
                    "pg_isready",
                    "-U",
                    "${DATABASE_USER}",
                    "-d",
                    "${DATABASE_NAME}",
                ]
            interval: 10s
            timeout: 5s
            retries: 5
        restart: unless-stopped

    app:
        image: ghcr.io/ai-science-articles-aggregator/core-engine:latest
        env_file: [.env]
        environment:
            DATABASE_HOST: postgres
            DATABASE_PORT: 5432
        ports:
            - "8000:8000"
        depends_on:
            postgres:
                condition: service_healthy
        restart: unless-stopped

volumes:
    postgres_data:
