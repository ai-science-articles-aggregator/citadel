services:
    postgres:
        image: postgres:17-alpine
        environment:
            POSTGRES_USER: ${DATABASE_USER}
            POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
            POSTGRES_DB: ${DATABASE_NAME}
        env_file: [.env]
        volumes:
            - postgres_data:/var/lib/postgresql/data
        healthcheck:
            test:
                [
                    "CMD",
                    "pg_isready",
                    "-U",
                    "${DATABASE_USER}",
                    "-d",
                    "${DATABASE_NAME}",
                ]
            interval: 10s
            timeout: 5s
            retries: 5
        restart: unless-stopped

    backend:
        image: ghcr.io/ai-science-articles-aggregator/core-engine:latest
        env_file: [.env]
        environment:
            DATABASE_HOST: postgres
            DATABASE_PORT: 5432
        # порт наружу не публикуем — доступ только через nginx.
        # (для отладки /docs можно временно раскомментировать)
        # ports:
        #     - "8000:8000"
        depends_on:
            postgres:
                condition: service_healthy
        restart: unless-stopped

    frontend:
        image: ghcr.io/ai-science-articles-aggregator/margin:latest
        environment:
            HOST: 0.0.0.0
            PORT: 3000
        depends_on:
            - backend
        restart: unless-stopped

    nginx:
        image: nginx:alpine
        ports:
            - "80:80"
        volumes:
            - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
        depends_on:
            - frontend
            - backend
        restart: unless-stopped

volumes:
    postgres_data:
